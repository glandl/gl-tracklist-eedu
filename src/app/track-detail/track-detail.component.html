<mat-toolbar>
  <button mat-icon-button (click)="goBack()">
    <mat-icon>arrow_back</mat-icon>
  </button>
  <span>{{ eventName || 'Session Details' }}</span>
  <span class="toolbar-spacer"></span>
  @if (canFavorite) {
    <button
      mat-icon-button
      data-test="favorite-toggle"
      [attr.aria-label]="(isFavorite$ | async) ? 'Aus Favoritenliste entfernen' : 'Zur Favoritenliste hinzufügen'"
      (click)="toggleFavorite()">
      <mat-icon>{{ (isFavorite$ | async) ? 'star' : 'star_border' }}</mat-icon>
    </button>
  }
</mat-toolbar>

@if (loading) {
  <div class="loading">Wird geladen…</div>
} @else if (track) {
  <div class="detail">
    <h1 [innerHTML]="track.Titel"></h1>

    <div class="meta">
      <span class="slot">{{ track.Slot }}</span>
      <span class="room">{{ track.Raum }}</span>
      @if (track.dkStyle) {
        <span class="digikomp-badge" [ngClass]="track.dkStyle">{{ digiKompLabel }}</span>
      }
      <span class="room">{{ track.DigiKomp }}</span>


    </div>

    <div class="presenter">{{ track.Vorname }} {{ track.Nachname }}</div>

    <div class="description" [innerHTML]="track.Beschreibungstext"></div>
  </div>
} @else {
  <div class="empty-state">Session nicht gefunden.</div>
}
